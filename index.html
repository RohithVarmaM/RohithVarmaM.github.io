<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 50px; }
        .container { max-width: 400px; margin: auto; }
        .avatar { width: 150px; border-radius: 50%; margin-bottom: 20px; }
        .link { display: block; padding: 15px; margin: 10px 0; background: white; text-decoration: none; color: #333; border-radius: 10px; border: 1px solid #ddd; transition: 0.3s; }
        .link:hover { background: #333; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Name</h1>
        <p>Short bio about myself.</p>
        
        <!-- Replace the '#' with your actual links -->
        <a class="link" href="#">LinkedIn</a>
        <a class="link" href="#">Twitter / X</a>
        <a class="link" href="#">Portfolio</a>
    </div>
</body>
</html>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
