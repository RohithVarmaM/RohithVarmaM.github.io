backend:
  name: github
  repo: your-username/your-repo-name # Replace with your actual repo
  branch: main

media_folder: "assets/images" # Where images will be saved
public_folder: "/assets/images"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Profile"
        name: "profile"
        file: "profile.json" # You will need to create this JSON file in your repo
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Bio", name: "bio", widget: "text"}
